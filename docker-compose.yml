version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ghr_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ghr_admin
      POSTGRES_PASSWORD: ghr_secure_pass_2024
      POSTGRES_DB: ghr_financial
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ghr_admin -d ghr_financial"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
